# 已升级 ghaction-virustotal 至 v4（release 触发、ubuntu 平台、files、update_release_body、VT_API_KEY 均保持不变）
name: Virus Scan

on:
  release:
    types: [ published ]

jobs:
  virustotal:
    runs-on: ubuntu-latest
    steps:
      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@v4
        with:
          update_release_body: true
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            .exe$
