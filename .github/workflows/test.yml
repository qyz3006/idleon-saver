# =============================================================================
# idleon-saver CI 工作流（单文件交付）
# -----------------------------------------------------------------------------
# 设计要点（why）：
#   * Python 固定 3.9 —— pyproject 锁 python = "~3.9"，且 plyvel 仅提供
#     cp39 的 win 专用 wheel，3.10+ 装不上 plyvel。
#   * 放弃 Poetry —— Poetry 会去克隆 chromecontroller / telenium 这两个
#     GitHub git 源依赖，CI 网络下易超时/失败；改用 `pip install -e . --no-deps`
#     跳过 git 依赖，再手动装最少运行时依赖（plyvel + pytest）。
#   * kivy / telenium / ChromeController 不在测试链路里（gui 测试被
#     @pytest.mark.gui 标记且需模拟器/显示器，CI 跑不了也不该跑），所以
#     完全不装、也不注入 KIVY_* 环境变量。
#   * 排除 gui 标记：`-m "not gui"`，避免拉起真实 GUI 测试。
#   * 覆盖率不上报 coveralls（需外部 token/账号，会让 CI 红），改为
#     生成 coverage.xml 并用 upload-artifact 留档。
# =============================================================================

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        # 注意：不使用 submodules: true —— 本仓库用 idleon_saver/data/vendored/
        # 内联数据而非 git 子模块，拉子模块只会拖慢且可能失败。

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install system leveldb (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libleveldb-dev

      - name: Install test tooling
        run: python -m pip install pytest pytest-cov

      - name: Install plyvel (Windows wheel)
        if: runner.os == 'Windows'
        run: python -m pip install wheels/plyvel-1.4.0-cp39-cp39-win_amd64.whl

      - name: Install plyvel (manylinux wheel)
        if: runner.os == 'Linux'
        run: python -m pip install plyvel

      - name: Install package (skip git deps)
        run: python -m pip install -e . --no-deps

      - name: Smoke import
        run: python -c "import idleon_saver; print('import OK')"

      - name: Run tests
        run: pytest -m "not gui" -q --cov=idleon_saver --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.xml
